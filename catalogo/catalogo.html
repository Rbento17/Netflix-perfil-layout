<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Netflix</title>
    <link rel="stylesheet" href="./catalogo.css">
</head>
<body>
    <header>
        <span class="logo"><img src="logo.png" alt="Logo da Netflix" class="logoimg"> </span>
        <nav aria-label="Seções do catálogo">
            <a href="#destaques">Destaques</a>
            <a href="#originais">Originais</a>
            <a href="#tendencias">Tendências</a>
        </nav>
        <input class="search-bar" type="search" placeholder="Buscar filmes, séries e mais..." aria-label="Buscar catálogo">
    </header>

    <main>
        <section class="hero" id="destaques">
            <h1>Novidades para maratonar hoje</h1>
            <p>Explore os lançamentos mais recentes, séries originais e filmes premiados. Toque em qualquer título para ver mais detalhes.</p>
        </section>

        <section class="catalog-section" id="originais">
            <h2>Originais Netflix</h2>
            <div class="movie-grid">
                <article class="movie-card">
                    <a href="#">
                        <figure>
                            <img src="asombradaverdade.png" alt="Poster do filme A Sombra da Verdade">
                            <figcaption>
                                <h3 class="movie-title">A Sombra da Verdade</h3>
                                <p class="movie-meta"><span>2025</span><span>Suspense</span><span>2h 10m</span></p>
                            </figcaption>
                        </figure>
                    </a>
                </article>
                <article class="movie-card">
                    <a href="#">
                        <figure>
                            <img src="zona de combate.png" alt="Poster do filme Zona de Combate">
                            <figcaption>
                                <h3 class="movie-title">Zona de Combate</h3>
                                <p class="movie-meta"><span>2024</span><span>Ação</span><span>1h 58m</span></p>
                            </figcaption>
                        </figure>
                    </a>
                </article>
                <article class="movie-card">
                    <a href="#">
                        <figure>
                            <img src="Além das Palavras.png" alt="Poster do filme Além das Palavras">
                            <figcaption>
                                <h3 class="movie-title">Além das Palavras</h3>
                                <p class="movie-meta"><span>2023</span><span>Drama</span><span>2h 5m</span></p>
                            </figcaption>
                        </figure>
                    </a>
                </article>
                <article class="movie-card">
                    <a href="#">
                        <figure>
                            <img src="Reino das Sombras.png" alt="Poster do filme Reino das Sombras">
                            <figcaption>
                                <h3 class="movie-title">Reino das Sombras</h3>
                                <p class="movie-meta"><span>2025</span><span>Fantasia</span><span>1h 45m</span></p>
                            </figcaption>
                        </figure>
                    </a>
                </article>
            </div>
        </section>

        <section class="catalog-section" id="tendencias">
            <h2>Tendências</h2>
            <div class="movie-grid">
                <article class="movie-card">
                    <a href="#">
                        <figure>
                            <img src="O Tesouro Perdido.png" alt="Poster do filme O Tesouro Perdido">
                            <figcaption>
                                <h3 class="movie-title">O Tesouro Perdido</h3>
                                <p class="movie-meta"><span>2024</span><span>Ficção</span><span>2h 22m</span></p>
                            </figcaption>
                        </figure>
                    </a>
                </article>
                <article class="movie-card">
                    <a href="#">
                        <figure>
                            <img src="A Maldição da Floresta.png" alt="Poster do filme A Maldição da Floresta">
                            <figcaption>
                                <h3 class="movie-title">A Maldição da Floresta</h3>
                                <p class="movie-meta"><span>2025</span><span>Thriller</span><span>1h 51m</span></p>
                            </figcaption>
                        </figure>
                    </a>
                </article>
                <article class="movie-card">
                    <a href="#">
                        <figure>
                            <img src="Império em Guerra.png" alt="Poster do filme Império em Guerra">
                            <figcaption>
                                <h3 class="movie-title">Império em Guerra</h3>
                                <p class="movie-meta"><span>2023</span><span>Romance</span><span>2h 3m</span></p>
                            </figcaption>
                        </figure>
                    </a>
                </article>
                <article class="movie-card">
                    <a href="#">
                        <figure>
                            <img src="Academia dos Mistérios.png" alt="Poster do filme Academia dos Mistérios">
                            <figcaption>
                                <h3 class="movie-title">Academia dos Mistérios</h3>
                                <p class="movie-meta"><span>2024</span><span>Ação</span><span>2h 8m</span></p>
                            </figcaption>
                        </figure>
                    </a>
                </article>
            </div>
        </section>
    </main>
</body>
</html>
